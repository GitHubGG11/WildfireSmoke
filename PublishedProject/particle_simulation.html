<body>
    <div id="cesiumContainer"></div>
    <script>
        window.CESIUM_BASE_URL = 'https://node.redfish.com/Documents/cody/cesium/cesiumZip/Build/Cesium/';
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzZTIxNDU1ZC04NmQxLTQ2OWEtYTlkZS1kNTUzMDQ1ZWU5MjAiLCJpZCI6MTI2ODkwLCJpYXQiOjE2Nzc3MDI5Nzd9.Z_aKhzurjeaSidN2Ogwz2-VBQIdvYOhzzO2ui0dWN6s';

        const czml = [
        {
            id: "document",
            name: "CZML Point - Time Dynamic",
            version: "1.0",
        },
        {
            id: "point",
            availability: "2012-08-04T16:00:00Z/2012-08-04T16:05:00Z",
            position: {
            epoch: "2012-08-04T16:00:00Z",
            cartographicDegrees: [
                0,-70,20,150000,
                10,-80,44,150000,
                200,-90,18,150000,
                300,-98,52,150000,
            ],
            },
            point: {
                color: {
                    rgba: [255, 255, 255, 128],
                },
                outlineColor: {
                    rgba: [255, 0, 0, 128],
                },
                outlineWidth: 3,
                pixelSize: 15,
            },
        },
        ];

        const viewer = new Cesium.Viewer("cesiumContainer", {
            shouldAnimate: true,
            terrain: Cesium.Terrain.fromWorldTerrain()
        });

        viewer.dataSources.add(Cesium.CzmlDataSource.load('./mosquitofire/rockcreek/10/smoke.czml'));
        viewer.dataSources.add(Cesium.CzmlDataSource.load('./mosquitofire/rockcreek/10/clouds.czml'));
        // viewer.dataSources.add(Cesium.CzmlDataSource.load(czml));
        viewer.zoomTo(viewer.dataSources);

    </script>
